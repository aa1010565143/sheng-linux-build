name: Build Kernel Bundle

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version (e.g., 7.1)"
        required: true
        default: "7.1"

jobs:
  bundle:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Determine Kernel Version
      id: set_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.kernel_version }}" >> $GITHUB_ENV
        else
          echo "VERSION=7.1" >> $GITHUB_ENV
        fi

    - name: Install FPM & Dependencies
      run: |
        echo "🛠️ 正在安装包管理转换工具 (FPM)..."
        sudo apt-get update -y
        # 【修改这里】：把 bsdtar 替换为了 libarchive-tools
        sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm libarchive-tools
        sudo gem install fpm

    - name: Download DEB releases from upstream
      run: |
        mkdir bundle && cd bundle

        echo "⬇️ 从目标仓库下载 kernel (.deb)..."
        gh release download "kernel-${{ env.VERSION }}" \
          --pattern "*.deb" \
          --repo "code002-2/Xiaomi-pad-6s-pro-Linux" \
          --clobber || true

        echo "⬇️ 从目标仓库下载 sheng_devauth (.deb)..."
        gh release download "sheng_devauth" \
          --pattern "*.deb" \
          --repo "code002-2/Xiaomi-pad-6s-pro-Linux" \
          --clobber || true

        echo "⬇️ 从目标仓库下载 sensor (.deb)..."
        gh release download "sensor" \
          --pattern "*.deb" \
          --repo "code002-2/Xiaomi-pad-6s-pro-Linux" \
          --clobber || true

        # 检查是否下载成功
        COUNT=$(ls *.deb 2>/dev/null | wc -l)
        if [ "$COUNT" -lt 5 ]; then
          echo "❌ 下载的 .deb 包数量不足！当前数量: $COUNT"
          exit 1
        fi

      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert DEB to RPM and Arch Linux packages
      run: |
        cd bundle
        echo "🔄 开始将 .deb 转换为 .rpm 和 .pkg.tar.zst..."

        # 遍历当前目录下所有的 .deb 文件
        for deb_file in *.deb; do
          if [ -f "$deb_file" ]; then
            echo "👉 正在转换: $deb_file"
            
            # 使用 FPM 将 deb 转换为 Fedora 的 rpm
            fpm -s deb -t rpm "$deb_file"
            
            # 使用 FPM 将 deb 转换为 Arch 的 pacman 包
            fpm -s deb -t pacman "$deb_file"
          fi
        done

        echo "✅ 所有格式转换完成！最终产物列表："
        ls -lah

    # 5. 打包发布全平台 Bundle
    - name: Create bundle release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: kernel-bundle-${{ env.VERSION }}
        name: Kernel Bundle ${{ env.VERSION }}
        files: |
          bundle/*.deb
          bundle/*.rpm
          bundle/*.pkg.tar.zst
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
